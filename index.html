<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCA Digital Logic Academy & Interactive Labs</title>
  
  <!-- CDNs for Styles and Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- KaTeX defer scripts -->
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
  
  <!-- Markdown Parser and Textbook Content Database -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="textbook_content.js"></script>

  <style>
    /* CSS DESIGN SYSTEM - Apple Clean / Figma Spacing */
    :root {
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --bg-dark: #0f172a;
      --bg-dark-card: #1e293b;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-light: #f8f9fa;
      --border-color: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
      
      --color-math: #0066cc;
      --color-hardware: #8a2be2;
      --color-memory: #ff8c00;
      --color-success: #2e7d32;
      --color-error: #d32f2f;
      --color-accent-light: #e0f2fe;

      /* Motion Speeds */
      --t-hover: 150ms;
      --t-click: 220ms;
      --t-morph: 350ms;
      --t-flow: 450ms;
      --t-page: 400ms;
    }

    .high-contrast {
      --bg-primary: #ffffff;
      --bg-secondary: #ffffff;
      --text-primary: #000000;
      --text-secondary: #000000;
      --border-color: #000000;
      --color-math: #0000ff;
      --color-hardware: #7f00ff;
      --color-memory: #ff6600;
      --color-success: #008000;
      --color-error: #ff0000;
    }

    .reduced-motion * {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
    }

    /* TOP NAVIGATION BAR */
    header {
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0.75rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-sm);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.025em;
    }

    .logo i {
      color: var(--color-hardware);
    }

    .nav-tabs {
      display: flex;
      background-color: var(--bg-primary);
      padding: 0.25rem;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      margin-right: 1.5rem;
    }

    /* Prevent KaTeX display math horizontal spills/overflow */
    .katex-display {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0.5rem 0;
      max-width: 100%;
    }
    
    .katex {
      white-space: nowrap;
    }

    .nav-btn {
      padding: 0.5rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      background: none;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all var(--t-hover) ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-btn:hover {
      color: var(--text-primary);
    }

    .nav-btn.active {
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn-icon {
      background: none;
      border: 1px solid var(--border-color);
      padding: 0.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all var(--t-hover) ease;
      color: var(--text-secondary);
    }

    .btn-icon:hover {
      background-color: var(--bg-primary);
      color: var(--text-primary);
    }

    .progress-bar-container {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
      min-width: 150px;
    }

    .progress-track {
      background-color: var(--border-color);
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      background-color: var(--color-success);
      height: 100%;
      width: 0%;
      transition: width var(--t-morph) ease;
    }

    /* PROFESSIONAL DIAGRAMS STYLING (Royal Cream Theme) */
    .custom-diagram {
      background: #fdfaf2;
      color: #1e293b;
      border: 1.5px solid #e4dcd3;
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      overflow-x: auto;
      box-shadow: var(--shadow-md);
    }
    
    .flow-row {
      flex-direction: row;
    }
    
    .flow-column {
      flex-direction: column;
      align-items: center;
    }
    
    .diag-card {
      background: #ffffff;
      border: 1.5px solid #e4dcd3;
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      min-width: 160px;
      max-width: 240px;
      text-align: center;
      position: relative;
      transition: all var(--t-hover) ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    
    .diag-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.15);
      border-color: #ea580c;
    }
    
    /* Rainbow Palette Borders (No Cyan or Light Green) */
    .diag-card.red { border-left: 5px solid #dc2626; }
    .diag-card.orange { border-left: 5px solid #ea580c; }
    .diag-card.yellow { border-left: 5px solid #ca8a04; }
    .diag-card.green { border-left: 5px solid #16a34a; }
    .diag-card.blue { border-left: 5px solid #2563eb; }
    .diag-card.indigo { border-left: 5px solid #4f46e5; }
    .diag-card.purple { border-left: 5px solid #7c3aed; }
    .diag-card.pink { border-left: 5px solid #db2777; }
    
    .diag-badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 0.25rem;
    }
    
    .diag-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1e293b;
    }
    
    .diag-desc {
      font-size: 0.75rem;
      color: #475569;
      margin-top: 0.25rem;
      line-height: 1.3;
    }
    
    .diag-connector {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .flow-row .diag-connector {
      width: 40px;
      height: 20px;
    }
    
    .flow-column .diag-connector.vertical {
      width: 20px;
      height: 30px;
      flex-direction: column;
    }
    
    .connector-line {
      background: #cbd5e1;
    }
    
    .flow-row .connector-line {
      width: 100%;
      height: 2px;
    }
    
    .flow-column .connector-line {
      width: 2px;
      height: 100%;
    }
    
    .connector-arrow {
      color: #cbd5e1;
      font-size: 0.8rem;
      position: absolute;
    }
    
    .flow-row .connector-arrow {
      right: -2px;
    }
    
    .flow-column .connector-arrow {
      bottom: -2px;
    }
    
    .diag-node {
      background: #ffffff;
      border: 1.5px dashed #cbd5e1;
      border-radius: 20px;
      padding: 0.4rem 1.2rem;
      font-size: 0.8rem;
      font-weight: 700;
      color: #475569;
    }
    
    .diag-node.start {
      background: rgba(22, 163, 74, 0.08);
      border-color: #16a34a;
      color: #16a34a;
    }
    
    .diag-node.problem {
      background: rgba(220, 38, 38, 0.08);
      border-color: #dc2626;
      color: #dc2626;
    }
    
    /* SUMMARY CALLOUT BOXES */
    .custom-summary-box {
      background: #fdfaf2;
      border: 1.5px solid #e4dcd3;
      border-left: 5px solid #ea580c;
      border-radius: 8px;
      margin: 1.5rem 0;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      color: #1e293b;
    }
    
    .summary-header {
      background: #fbf8f3;
      padding: 0.6rem 1.25rem;
      font-size: 0.85rem;
      font-weight: 700;
      color: #1e293b;
      border-bottom: 1.5px solid #e4dcd3;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .summary-header i {
      color: #ea580c;
    }
    
    .summary-body {
      padding: 1rem 1.25rem;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    
    .summary-body p {
      margin-bottom: 0.5rem;
    }
    
    .summary-body p:last-child {
      margin-bottom: 0;
    }
    
    .summary-body code {
      background: rgba(0, 0, 0, 0.05);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      color: #dc2626;
      font-family: monospace;
    }
    
    /* STUDENT ATTENDANCE QUEUE */
    .student-queue {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1.5rem;
      background: #fdfaf2;
      border-radius: 12px;
      border: 1.5px solid #e4dcd3;
    }
    
    .student-box {
      background: #ffffff;
      border: 1.5px solid #e4dcd3;
      border-radius: 6px;
      padding: 0.6rem 1rem;
      min-width: 90px;
      text-align: center;
      position: relative;
      font-size: 0.85rem;
      font-weight: 600;
      color: #475569;
    }
    
    .student-box.active {
      background: rgba(37, 99, 235, 0.08);
      border-color: #2563eb;
      color: #2563eb;
      box-shadow: 0 0 12px rgba(37, 99, 235, 0.2);
    }
    
    .student-box.completed {
      background: rgba(22, 163, 74, 0.08);
      border-color: #16a34a;
      color: #16a34a;
    }
    
    .student-box.ellipsis {
      border: none;
      background: none;
      min-width: unset;
      padding: 0 0.5rem;
    }
    
    .student-pointer {
      position: absolute;
      bottom: -1.8rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      font-weight: 700;
      color: #2563eb;
      white-space: nowrap;
    }
    
    .queue-arrow {
      color: #94a3b8;
      font-size: 1rem;
    }
    
    /* ARRAY CONTAINER */
    .array-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      margin: 1.5rem 0;
    }
    
    .array-indexes {
      display: flex;
      gap: 4px;
    }
    
    .index-cell {
      width: 45px;
      text-align: center;
      font-size: 0.7rem;
      font-weight: bold;
      color: #64748b;
    }
    
    .array-cells {
      display: flex;
      background: #f1ebd9;
      border: 1.5px solid #e4dcd3;
      border-radius: 8px;
      padding: 4px;
      gap: 4px;
      box-shadow: var(--shadow-sm);
    }
    
    .array-cell {
      width: 45px;
      height: 45px;
      background: #ffffff;
      border: 1.5px solid #e4dcd3;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.1rem;
      color: #1e293b;
    }
    
    .array-label {
      font-size: 0.75rem;
      color: #64748b;
      font-weight: 600;
      margin-top: 0.25rem;
    }
    
    /* RECURSION CALL STACK */
    .call-stack {
      display: flex;
      flex-direction: column-reverse;
      gap: 6px;
      background: #fdfaf2;
      border: 1.5px solid #e4dcd3;
      border-radius: 12px;
      padding: 1.25rem;
      max-width: 320px;
      margin: 1.5rem auto;
      box-shadow: var(--shadow-md);
    }
    
    .stack-plate {
      background: #ffffff;
      border: 1.5px solid #e4dcd3;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all var(--t-hover) ease;
    }
    
    .stack-plate.paused {
      border-left: 5px solid #ea580c;
    }
    
    .stack-plate.active {
      border-left: 5px solid #16a34a;
      background: rgba(22, 163, 74, 0.05);
      box-shadow: 0 0 10px rgba(22, 163, 74, 0.15);
    }
    
    .plate-badge {
      font-size: 0.65rem;
      font-weight: bold;
      color: #64748b;
      text-transform: uppercase;
    }
    
    .plate-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #1e293b;
    }
    
    .plate-status {
      font-size: 0.65rem;
      margin-top: 0.15rem;
      font-weight: 600;
    }
    
    .stack-plate.paused .plate-status { color: #ea580c; }
    .stack-plate.active .plate-status { color: #16a34a; }
    
    .stack-label {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.5rem;
      border-top: 1px solid #e4dcd3;
      padding-top: 0.5rem;
    }
    
    /* CONCEPT HIERARCHY TREE */
    .concept-tree {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 1.5rem;
      background: #fdfaf2;
      border-radius: 12px;
      border: 1.5px solid #e4dcd3;
      margin: 1.5rem 0;
    }
    
    .tree-root {
      background: #ffffff;
      border: 1.5px solid #e4dcd3;
      border-radius: 8px;
      padding: 0.5rem 1.25rem;
      font-weight: bold;
      font-size: 0.95rem;
      color: #1e293b;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    
    .tree-root small, .leaf-node small {
      display: block;
      font-size: 0.7rem;
      font-weight: normal;
      color: #64748b;
      margin-top: 0.15rem;
    }
    
    .tree-branch-container {
      display: flex;
      gap: 2rem;
      width: 100%;
      justify-content: space-around;
      position: relative;
    }
    
    .tree-branch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      flex: 1;
    }
    
    .branch-header {
      font-size: 0.75rem;
      font-weight: bold;
      color: #ea580c;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 2px solid #ea580c;
      padding-bottom: 0.25rem;
      text-align: center;
      width: 80%;
    }
    
    .branch-leaves {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      width: 100%;
      align-items: center;
    }
    
    .leaf-node {
      background: #ffffff;
      border: 1.5px solid #e4dcd3;
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #475569;
      width: 80%;
      text-align: center;
      transition: all var(--t-hover) ease;
    }
    
    .leaf-node:hover {
      border-color: #ea580c;
      color: #1e293b;
    }
    
    .leaf-node.highlight {
      background: rgba(124, 58, 237, 0.08);
      border-color: #7c3aed;
      color: #7c3aed;
    }
    
    .sub-leaves {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
      justify-content: center;
      width: 100%;
    }
    
    .sub-leaves .leaf-node {
      width: auto;
      font-size: 0.7rem;
      padding: 0.25rem 0.5rem;
      background: #fbf8f3;
      border-color: #e4dcd3;
      color: #475569;
    }
    
    /* ASYMPTOTIC GRAPH CONTAINER */
    .graph-container {
      background: #fdfaf2;
      border-radius: 12px;
      padding: 1.5rem;
      border: 1.5px solid #e4dcd3;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      overflow-x: auto;
    }
    
    .asymptotic-graph {
      display: block;
      width: 100%;
      height: auto;
      max-width: 100%;
      min-width: 280px;
    }
    
    .asymptotic-graph text {
      font-family: inherit;
    }

    /* MAIN CONTAINER */
    .app-container {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* SIDEBARS */
    aside {
      width: 320px;
      background-color: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-header h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sidebar-menu {
      list-style: none;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all var(--t-hover) ease;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      text-align: left;
      border: none;
      background: none;
      width: 100%;
    }

    .menu-item:hover {
      background-color: var(--bg-primary);
      color: var(--text-primary);
    }

    .menu-item.active {
      background-color: var(--color-accent-light);
      color: var(--color-math);
      font-weight: 600;
    }

    .menu-item i {
      font-size: 1rem;
      width: 20px;
      text-align: center;
    }

    .menu-item.completed i {
      color: var(--color-success);
    }

    /* CONTENT VIEWER */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 3rem 4rem;
      background-color: var(--bg-primary);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .content-card {
      background-color: var(--bg-secondary);
      border-radius: 16px;
      padding: 3rem;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-md);
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Style code blocks and inline code to prevent horizontal layout spills */
    .content-text pre {
      background-color: #fdfaf2;
      border: 1.5px solid #e4dcd3;
      border-radius: 8px;
      padding: 1rem;
      margin: 1.5rem 0;
      overflow-x: auto;
      max-width: 100%;
      box-sizing: border-box;
    }
    
    .content-text pre code {
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      color: #1e293b;
      white-space: pre;
      background: none;
      padding: 0;
    }
    
    .content-text code {
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      background-color: rgba(0, 0, 0, 0.05);
      color: #dc2626;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      word-break: break-all;
    }

    .content-text {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text-primary);
    }

    .content-text h1 {
      font-size: 2.25rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      letter-spacing: -0.03em;
    }

    .content-text h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 2rem;
      margin-bottom: 1rem;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 0.5rem;
    }

    .content-text h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
    }

    .content-text p {
      margin-bottom: 1.25rem;
    }

    .content-text ul, .content-text ol {
      margin-left: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .content-text li {
      margin-bottom: 0.5rem;
    }

    .content-text table {
      display: block;
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;

        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:3rem; text-align:center; background-color:#0b0f19; border-radius:12px; border:1px solid #1e293b; color:#cbd5e1; width:100%; min-height:350px; gap:1.5rem;">
          <div style="font-size:3.5rem; animation: pulse 2s infinite; color:#38bdf8;">
            <i class="fa-solid fa-screwdriver-wrench"></i>
          </div>
          <div>
            <h3 style="font-size:1.6rem; font-weight:700; color:#f8fafc; margin-bottom:0.75rem; letter-spacing:0.05em;">WORK IN PROGRESS</h3>
            <p style="font-size:0.95rem; color:#94a3b8; max-width:420px; margin:0 auto; line-height:1.6;">
              The interactive laboratory simulation for <strong>${title}</strong> is currently under academic design and will be available soon.
            </p>
          </div>
          <div style="display:inline-block; padding:0.4rem 1rem; background-color:#1e293b; border-radius:20px; font-size:0.8rem; font-weight:600; color:#38bdf8; border:1px solid #334155;">
            Educational Content is Fully Active
          </div>
        </div>
      `;
      updateObservations([
        "✔ Educational theory content loaded successfully.",
        "⚠ Interactive simulator state: WORK IN PROGRESS. Under development."
      ]);
      document.getElementById("hardware-text").innerText = "This simulation is currently under development to align with core syllabus requirements.";
    }

    function changeSubject(subject) {
      activeSubject = subject;
      try {
        localStorage.setItem("activeSubject", subject);
      } catch (e) {
        console.warn("Could not save activeSubject to storage:", e);
      }

      // Sync selector dropdown
      const selector = document.getElementById("subject-select");
      if (selector) selector.value = subject;

      // Select the first chapter of the new subject
      const firstChapterIdx = CHAPTERS.findIndex(ch => ch.subject === subject);
      if (firstChapterIdx !== -1) {
        currentChapterIndex = firstChapterIdx;
        try {
          localStorage.setItem("activeChapterIndex", firstChapterIdx);
        } catch (e) {
          console.warn("Could not save activeChapterIndex to storage:", e);
        }
      }

      // Select the first lab of the new subject
      const firstLab = LABS.find(l => l.subject === subject);
      if (firstLab) {
        activeLabId = firstLab.id;
        try {
          localStorage.setItem("activeLabId", firstLab.id);
        } catch (e) {
          console.warn("Could not save activeLabId to storage:", e);
        }
      }

      renderSidebarMenu();
      loadChapter(currentChapterIndex);
      if (currentView === "experiment") {
        loadLab(activeLabId);
      }
    }

    window.onload = function() {
      // Restore states from localStorage safely
      let savedChapter = null;
      let savedView = null;
      let savedLab = null;
      let savedSubject = null;
      
      try {
        savedChapter = localStorage.getItem("activeChapterIndex");
        savedView = localStorage.getItem("activeView");
        savedLab = localStorage.getItem("activeLabId");
        savedSubject = localStorage.getItem("activeSubject");
      } catch (e) {
        console.warn("Storage access not allowed or supported:", e);
      }

      if (savedSubject && ["ca", "daa", "dbms"].includes(savedSubject)) {
        activeSubject = savedSubject;
      } else {
        activeSubject = "ca";
      }

      // Sync selector dropdown on load
      const selector = document.getElementById("subject-select");
      if (selector) selector.value = activeSubject;
      
      if (savedChapter !== null) {
        const parsed = parseInt(savedChapter, 10);
        if (!isNaN(parsed) && parsed >= 0 && parsed < CHAPTERS.length) {
          // Verify it matches activeSubject
          if (CHAPTERS[parsed].subject === activeSubject) {
            currentChapterIndex = parsed;
          } else {
            const firstCh = CHAPTERS.findIndex(ch => ch.subject === activeSubject);
            if (firstCh !== -1) currentChapterIndex = firstCh;
          }
        }
      } else {
        const firstCh = CHAPTERS.findIndex(ch => ch.subject === activeSubject);
        if (firstCh !== -1) currentChapterIndex = firstCh;
      }
      
      if (savedLab !== null && LABS.some(l => l.id === savedLab)) {
        const lab = LABS.find(l => l.id === savedLab);
        if (lab && lab.subject === activeSubject) {
          activeLabId = savedLab;
        } else {
          const firstLab = LABS.find(l => l.subject === activeSubject);
          if (firstLab) activeLabId = firstLab.id;
        }
      } else {
        const firstLab = LABS.find(l => l.subject === activeSubject);
        if (firstLab) activeLabId = firstLab.id;
      }

      renderSidebarMenu();
      loadChapter(currentChapterIndex);
      setupAccessibility();

      let viewToSwitch = "learn";
      if (savedView === "learn" || savedView === "experiment") {
        viewToSwitch = savedView;
      }
      switchView(viewToSwitch);
    };

    function renderSidebarMenu() {
      const menu = document.getElementById("learn-menu");
      menu.innerHTML = "";
      
      // Filter chapters by active subject
      const filteredChapters = CHAPTERS.filter(ch => ch.subject === activeSubject);
      
      filteredChapters.forEach((ch) => {
        const globalIdx = CHAPTERS.indexOf(ch);
        const li = document.createElement("li");
        li.innerHTML = `
          <button class="menu-item ${globalIdx === currentChapterIndex ? 'active' : ''}" onclick="selectChapter(${globalIdx})">
            <i class="fa-solid fa-circle-check"></i> ${ch.shortLabel || ch.title.split(":")[0]}
          </button>
        `;
        menu.appendChild(li);
      });

      // Filter labs by active subject
      const labMenu = document.getElementById("lab-menu");
      labMenu.innerHTML = "";
      
      const filteredLabs = LABS.filter(l => l.subject === activeSubject);
      
      filteredLabs.forEach(lab => {
        const li = document.createElement("li");
        li.innerHTML = `
          <button class="menu-item ${lab.id === activeLabId ? 'active' : ''}" onclick="selectLab('${lab.id}')" id="btn-lab-item-${lab.id}">
            <i class="fa-solid fa-flask"></i> ${lab.title}
          </button>
        `;
        labMenu.appendChild(li);
      });
    }

    function selectChapter(idx) {
      loadChapter(idx);
      switchView("learn");
    }

    // INTERACTIVE LAB DRIVER / SELECTION
    function selectLab(labId) {
      activeLabId = labId;
      try {
        localStorage.setItem("activeLabId", labId);
      } catch (e) {
        console.warn("Could not save activeLabId to storage:", e);
      }
      loadLab(labId);
      switchView("experiment");
    }

    function loadChapter(idx) {
      currentChapterIndex = idx;
      try {
        localStorage.setItem("activeChapterIndex", idx);
      } catch (e) {
        console.warn("Could not save activeChapterIndex to storage:", e);
      }
      const ch = CHAPTERS[idx];
      const article = document.getElementById("learn-article");
      
      // Load raw Markdown from TEXTBOOK_CONTENT and parse with marked.js
      const rawMarkdown = TEXTBOOK_CONTENT[ch.id] || "### Content loading...";
      let html = marked.parse(rawMarkdown);
      
      // Inject Try in Lab CTA
      if (ch.labId) {
        html += `
          <button class="btn-action-lab" onclick="goToLab('${ch.labId}')" style="margin-top: 2rem;">
            <i class="fa-solid fa-flask"></i> Try in Lab! 🧪
          </button>
        `;
      }
      
      article.innerHTML = html;
      
      // Update sidebar highlight
      const items = document.querySelectorAll("#learn-menu .menu-item");
      const filteredChapters = CHAPTERS.filter(c => c.subject === activeSubject);
      items.forEach((item) => {
        const itemText = item.innerText.trim();
        const chShort = ch.shortLabel || ch.title.split(":")[0];
        if (itemText.includes(chShort)) {
          item.classList.add("active");
        } else {
          item.classList.remove("active");
        }
      });

      // Update progress Fill
      const progressPercent = ch.progress;
      document.getElementById("progress-percent").innerText = `${progressPercent}%`;
      document.getElementById("progress-fill").style.width = `${progressPercent}%`;
      
      let skillName = "Foundation";
      if (progressPercent > 40 && progressPercent <= 70) skillName = "Binary Base";
      else if (progressPercent > 70 && progressPercent <= 90) skillName = "Bases Bridge";
      else if (progressPercent > 90) skillName = "System logic";
      document.getElementById("progress-skill").innerText = skillName;

      // Enable/disable page buttons (within activeSubject context)
      const currentFilteredIdx = filteredChapters.indexOf(ch);
      document.getElementById("btn-prev").disabled = currentFilteredIdx === 0;
      document.getElementById("btn-next").innerText = currentFilteredIdx === filteredChapters.length - 1 ? "Finish" : "Next";

      // Render KaTeX markup equations
      setTimeout(() => {
        if (window.renderMathInElement) {
          renderMathInElement(article, {
            delimiters: [
              {left: "$$", right: "$$", display: true},
              {left: "$", right: "$", display: false}
            ],
            throwOnError: false
          });
        }
      }, 50);
    }

    function nextChapter() {
      const filteredChapters = CHAPTERS.filter(ch => ch.subject === activeSubject);
      const ch = CHAPTERS[currentChapterIndex];
      const currentFilteredIdx = filteredChapters.indexOf(ch);
      if (currentFilteredIdx !== -1 && currentFilteredIdx < filteredChapters.length - 1) {
        const nextCh = filteredChapters[currentFilteredIdx + 1];
        const nextGlobalIdx = CHAPTERS.indexOf(nextCh);
        loadChapter(nextGlobalIdx);
      }
    }

    function prevChapter() {
      const filteredChapters = CHAPTERS.filter(ch => ch.subject === activeSubject);
      const ch = CHAPTERS[currentChapterIndex];
      const currentFilteredIdx = filteredChapters.indexOf(ch);
      if (currentFilteredIdx !== -1 && currentFilteredIdx > 0) {
        const prevCh = filteredChapters[currentFilteredIdx - 1];
        const prevGlobalIdx = CHAPTERS.indexOf(prevCh);
        loadChapter(prevGlobalIdx);
      }
    }

    function switchView(view) {
      currentView = view;
      try {
        localStorage.setItem("activeView", view);
      } catch (e) {
        console.warn("Could not save activeView to storage:", e);
      }
      const viewL = document.getElementById("view-learn");
      const viewE = document.getElementById("view-experiment");
      const sideL = document.getElementById("sidebar-learn");
      const sideE = document.getElementById("sidebar-experiment");
      
      const btnL = document.getElementById("btn-learn");
      const btnE = document.getElementById("btn-experiment");

      if (view === "learn") {
        viewL.style.display = "flex";
        viewE.style.display = "none";
        sideL.style.display = "flex";
        sideE.style.display = "none";
        btnL.classList.add("active");
        btnE.classList.remove("active");
      } else {
        viewL.style.display = "none";
        viewE.style.display = "flex";
        sideL.style.display = "none";
        sideE.style.display = "flex";
        btnL.classList.remove("active");
        btnE.classList.add("active");
        loadLab(activeLabId);
      }
    }

    function goToLab(labId) {
      activeLabId = labId;
      try {
        localStorage.setItem("activeLabId", labId);
      } catch (e) {
        console.warn("Could not save activeLabId to storage:", e);
      }
      switchView("experiment");
    }

    function jumpToTheory() {
      // Find matching chapter that triggers this lab
      const idx = CHAPTERS.findIndex(ch => ch.labId === activeLabId);
      if (idx !== -1) {
        selectChapter(idx);
      }
    }

    // INTERACTIVE LAB DRIVER
    function loadLab(labId) {
      const lab = LABS.find(l => l.id === labId);
      if (!lab) return;

      activeLabId = labId;
      document.getElementById("lab-title").innerText = lab.title;
      document.getElementById("lab-subtitle").innerText = lab.subtitle;
      document.getElementById("hardware-text").innerText = lab.hardware;

      // Update lab menu selection
      const items = document.querySelectorAll("#lab-menu .menu-item");
      items.forEach(item => {
        if (item.id === `btn-lab-item-${labId}`) item.classList.add("active");
        else item.classList.remove("active");
      });

      const container = document.getElementById("sim-container");
      container.innerHTML = ""; // Reset container

      // Setup prediction overlay
      if (lab.prediction) {
        const overlay = document.createElement("div");
        overlay.className = "prediction-overlay";
        overlay.id = "pred-overlay";
        
        let optionsHtml = "";
        lab.prediction.options.forEach((opt, idx) => {
          optionsHtml += `<button class="prediction-btn" onclick="checkPrediction(${idx})">${opt}</button>`;
        });

        overlay.innerHTML = `
          <div class="prediction-title"><i class="fa-solid fa-circle-question" style="color:#60a5fa;"></i> Prediction Step: ${lab.prediction.question}</div>
          <div class="prediction-options">${optionsHtml}</div>
        `;
        container.appendChild(overlay);

        window.checkPrediction = function(ans) {
          overlay.remove(); // Clear overlay
          const correct = ans === lab.prediction.correct;
          if (correct) {
            updateObservations(["✔ Prediction was Correct! Aaiye ab simulation run karke verification dekhte hain."]);
          } else {
            updateObservations(["⚠ Prediction is Incorrect. Let's run the simulation to discover the true system behavior."]);
          }
        };
      }

      // Run specific setup
      lab.setup(container);
    }

    function updateObservations(stepsList) {
      const panel = document.getElementById("observation-list");
      panel.innerHTML = "";
      stepsList.forEach(step => {
        const li = document.createElement("li");
        li.innerHTML = `<i class="fa-solid fa-circle-check"></i> <span>${step}</span>`;
        panel.appendChild(li);
      });
    }

    // ACCESSIBILITY
    function toggleContrast() {
      highContrastActive = !highContrastActive;
      document.body.classList.toggle("high-contrast", highContrastActive);
      const btn = document.getElementById("btn-contrast");
      btn.style.color = highContrastActive ? "var(--color-math)" : "var(--text-secondary)";
      updateObservations([`✔ Accessibility mode: High Contrast ${highContrastActive ? "ON" : "OFF"}`]);
    }

    function toggleMotion() {
      reducedMotionActive = !reducedMotionActive;
      document.body.classList.toggle("reduced-motion", reducedMotionActive);
      const btn = document.getElementById("btn-motion");
      btn.style.color = reducedMotionActive ? "var(--color-math)" : "var(--text-secondary)";
      updateObservations([`✔ Accessibility mode: Reduced Motion ${reducedMotionActive ? "ON" : "OFF"}`]);
    }

    function setupAccessibility() {
      // Basic keyboard controls
      document.addEventListener("keydown", function(e) {
        if (e.key === "ArrowRight" && currentView === "learn") {
          nextChapter();
        } else if (e.key === "ArrowLeft" && currentView === "learn") {
          prevChapter();
        }
      });
    }
  </script>
</body>
</html>
